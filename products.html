<!DOCTYPE html>

    <link rel="stylesheet" href="css/style.css">

<body class="inner-page products-page">

<header class="header">

    <nav class="navbar-custom container">

        <div class="home-logo inner-logo">
            <i class="bi bi-gem"></i>
            <div>
                <strong>LUX</strong>
                <span>ACCESSORIES</span>
            </div>
        </div>

        <ul class="nav-menu">
            <li><a href="index.html">HOME</a></li>
            <li><a href="products.html" class="is-active">SHOP</a></li>
            <li><a href="collections.html">COLLECTIONS</a></li>
            <li><a href="about.html">ABOUT US</a></li>
            <li><a href="contact.html">CONTACT</a></li>
            <li><a href="faq.html">FAQ</a></li>
        </ul>

        <div class="top-actions">
            <a href="products.html" aria-label="Cart" class="cart-icon">
                <i class="bi bi-bag"></i>
                <small class="cart-count">0</small>
            </a>
        </div>

        <div class="menu-btn" aria-label="Toggle navigation" role="button" tabindex="0">
            <i class="bi bi-list"></i>
        </div>

    </nav>

</header>

<main>

    <!-- HERO -->

    <section class="page-banner">

        <div class="container">

            <h1>Our Products</h1>

            <p>
                Explore our luxury accessories collection.
            </p>

        </div>

    </section>

    <!-- FILTERS -->

    <section class="container product-filters text-center">

        <button class="filter-btn btn btn-dark m-2" data-category="all">All</button>
        <button class="filter-btn btn btn-outline-dark m-2" data-category="Bags">Bags</button>
        <button class="filter-btn btn btn-outline-dark m-2" data-category="Engagement Rings">Engagement Rings</button>
        <button class="filter-btn btn btn-outline-dark m-2" data-category="Bracelets">Bracelets</button>
        <button class="filter-btn btn btn-outline-dark m-2" data-category="Necklaces">Necklaces</button>
        <button class="filter-btn btn btn-outline-dark m-2" data-category="Earrings">Earrings</button>

    </section>

    <!-- PRODUCTS -->

    <section class="container pb-5">

        <div class="products-grid">

            <!-- Product cards are rendered dynamically by js/products-data.js + js/products-render.js -->

        </div>

    </section>

</main>

    <footer class="site-footer">
        <div class="container footer-content">

            <div class="footer-left">
                <div class="logo">Lux<span>Accessories</span></div>
            </div>

            <div class="footer-center">

                <div class="social-icons">
                    <a href="#" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
                    <a href="#" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
                    <a href="#" aria-label="X (Twitter)"><i class="bi bi-twitter-x"></i></a>
                </div>
            </div>

            <div class="footer-right">
                <p>&copy; 2026 Lux Accessories</p>
            </div>

        </div>
